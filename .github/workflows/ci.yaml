name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.info.outputs.artifact_name }}
    steps:
      - name: Get Build Info
        id: info
        run: |
          DATE=$(date +'%Y%m%d')
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "artifact_name=tmc_pc-${DATE}-${SHA}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    uses: ./.github/workflows/_build.yaml
    with:
      publish_mode: artifact
      artifact_name: ${{ needs.prepare.outputs.artifact_name }}
    secrets: inherit
