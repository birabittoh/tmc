name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    uses: ./.github/workflows/_build.yaml
    with:
      ref_name: ${{ github.ref_name }}
      artifact_suffix: ${{ github.ref_name }}
    secrets:
      TMC_ASSETS_PAT: ${{ secrets.TMC_ASSETS_PAT }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Collect archives
        shell: bash
        run: |
          mkdir -p upload
          find release-artifacts -name '*.tar.gz' -exec cp {} upload/ \;

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: upload/*.tar.gz
          generate_release_notes: true
