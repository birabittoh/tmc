name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_build.yaml
    with:
      publish_mode: release
      version_label: ${{ github.ref_name }}
    secrets: inherit

  create-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten artifact files
        shell: bash
        run: |
          mkdir -p uploads
          find release-assets -type f -name '*.tar.gz' -exec cp {} uploads/ \;

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "TMC ${{ github.ref_name }}"
          files: uploads/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
